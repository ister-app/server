
logging.level.app.ister.server.entitiy=trace
logging.group.tomcat=app.ister.server
logging.level.tomcat=trace

# swagger-ui custom path
#springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.oauth.clientId=ister
springdoc.oAuthFlow.openIdConnectUrl=${OIDC_URL:http://localhost:8060/realms/Ister}/.well-known/openid-configuration

# Graphql
spring.graphql.graphiql.enabled=true
# GraphQL subscriptions over websocket (graphql-transport-ws) on the same /graphql path.
# Auth happens via the connection_init payload, see GraphQlWebSocketAuthConfig (api module).
spring.graphql.websocket.path=/graphql
spring.graphql.websocket.connection-init-timeout=30s
spring.graphql.websocket.keep-alive=25s

# Spring security
spring.security.oauth2.resourceserver.jwt.issuer-uri=${OIDC_URL:https://localhost:8060/realms/Ister}

app.ister.server.ffmpeg-dir=${FFMPEG_DIR:/usr/bin}
app.ister.server.tmp-dir=${TMP_DIR:/tmp/ister/}
app.ister.server.cache-dir=${CACHE_DIR:/cache/}
app.ister.server.mkvextract=${MKVEXTRACT:/usr/bin/mkvextract}
app.ister.server.subtile-ocr=${SUBTILE_OCR:/usr/bin/subtile-ocr}

# Daily zombie-cleanup of the image cache and transcode tmp dirs (see CacheCleanupScheduler /
# TmpTranscodeCleanupScheduler). Starts in dry-run so the first deploy only logs what it would
# remove; flip CACHE_CLEANUP_DRY_RUN=false once the log is verified.
app.ister.server.cache-cleanup.enabled=${CACHE_CLEANUP_ENABLED:true}
app.ister.server.cache-cleanup.dry-run=${CACHE_CLEANUP_DRY_RUN:true}
app.ister.server.cache-cleanup.cron=${CACHE_CLEANUP_CRON:0 30 4 * * *}
app.ister.server.cache-cleanup.min-age=${CACHE_CLEANUP_MIN_AGE:24h}

# The name of the cluster.
app.ister.cluster.name=${app.ister.server.name}
# The name of the server this needs to be unique for every connected server.
app.ister.server.name=Test server
# The url where the client and the other server can reach this server
app.ister.server.url=http://localhost:8080

# If you want to get metadata from the movie db set here you'r api read access token.
#app.ister.server.TMDB.apikey=API Read Access Token
# TMDB allows roughly 40 requests per second; stay safely below that.
app.ister.server.TMDB.max-requests-per-second=30

# App-wide supported languages, ISO-639-1 / BCP-47 tags (comma-separated). First = primary.
# Drives both which languages TMDB metadata is fetched in and which languages search indexes.
app.ister.languages=${ISTER_LANGUAGES:en,nl}

spring.jpa.hibernate.ddl-auto=validate

# Flyway migration settings
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PATH:5432}/${DB_NAME:ister}
spring.datasource.username=${DB_USER:ister}
spring.datasource.password=${DB_PASSWORD:ister}
# Playback start (HLS playlist/segment requests + transcode orchestration + client
# heartbeats) fans out to many concurrent DB-touching requests; the Hikari default of
# 10 was exhausted in production, which starved the updatePlayQueue heartbeat for 30s
# per call. Fail faster instead: an interactive request that cannot get a connection
# within 10s is better retried (heartbeats fall back to the registry-based degraded
# publish) than queued for half a minute. Kept above a few seconds so batch RabbitMQ
# handlers ride out short bursts instead of burning retries.
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.connection-timeout=${DB_CONNECTION_TIMEOUT:10000}
spring.jpa.show-sql=false

# Load lazy associations in IN-batches instead of one query per entity (GraphQL
# resolvers touch many lazy collections per page of results).
spring.jpa.properties.hibernate.default_batch_fetch_size=50

spring.jpa.properties.hibernate.bytecode.provider=bytebuddy
spring.jpa.properties.hibernate.auto_manage_bidirectional_associations=false

spring.jpa.open-in-view=true

# Prefetch=1: a consumer holds at most one unacknowledged message. The default (250)
# combined with slow per-message work (ffprobe) and RabbitMQ's 30-min consumer_timeout
# caused the oldest of a 250-message batch to time out, force-closing the channel and
# requeueing the whole batch -> the same files were re-processed (ffprobed) many times
# over. With prefetch=1 the timeout only ever applies to a single in-flight message.
spring.rabbitmq.listener.simple.prefetch=1

# Process the per-directory backlogs in parallel. ffprobe/metadata work is I/O- and
# external-process-bound, so a few consumers per queue chew through the backlog far
# faster than one. A fixed concurrency (no max-concurrency) keeps this deterministic and
# avoids the listener's min<=max assert. Transcoding stays bounded by its own executor +
# concurrentFileSlots semaphore, so this does not oversubscribe the transcode passes.
spring.rabbitmq.listener.simple.concurrency=3

# Failed listeners: retry with backoff, then RepublishMessageRecoverer moves the
# message to the dead-letter queue (see RabbitReliabilityConfig).
spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.initial-interval=2s
spring.rabbitmq.listener.simple.retry.multiplier=2

# Publish with mandatory so the broker returns messages whose queue does not exist instead of
# dropping them; RabbitReliabilityConfig logs the return (see unroutableMessageLogger).
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.mandatory=true

spring.rabbitmq.host=localhost
spring.rabbitmq.username=user
spring.rabbitmq.password=password

management.endpoints.web.exposure.include=health,metrics,prometheus
management.server.port=8081

spring.cloud.refresh.enabled=false
spring.cloud.openfeign.client.refresh-enabled=false
spring.cloud.openfeign.lazy-attributes-resolution=false

# Tmdb settings
spring.cloud.openfeign.client.config.tmdb.defaultRequestHeaders.Authorization=Bearer ${app.ister.server.TMDB.apikey}
spring.cloud.openfeign.client.config.tmdb.url=https://api.themoviedb.org

