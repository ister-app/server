version: '3.9'

services:
  database:
    image: postgres:18
    restart: always
    volumes:
      - ./db-data/:/var/lib/postgresql/data/:Z
    environment:
      POSTGRES_USER: ister
      POSTGRES_PASSWORD: ister
      POSTGRES_DB: ister
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ister -d ister"]
      interval: 5s
      timeout: 5s
      retries: 10
  rabbitMQ:
    image: rabbitmq:3-management
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
  migrations:
    image: ghcr.io/ister-app/migrations:latest
    environment:
      FLYWAY_URL: jdbc:postgresql://database:5432/ister
      FLYWAY_USER: ister
      FLYWAY_PASSWORD: ister
    depends_on:
      database:
        condition: service_healthy
    restart: on-failure
  server:
    image: ghcr.io/ister-app/server:latest
    restart: always
    environment:
      DB_HOST: database
      APP_ISTER_SERVER_NAME: Test server
      APP_ISTER_SERVER_URL: http://localhost:8080
      APP_ISTER_DISK_LIBRARIES_0_NAME: shows
      APP_ISTER_DISK_LIBRARIES_0_TYPE: SHOW
#      APP_ISTER_DISK_DIRECTORIES_0_NAME: disk1
#      APP_ISTER_DISK_DIRECTORIES_0_PATH: /disk1
#      APP_ISTER_DISK_DIRECTORIES_0_LIBRARY: shows
#      APP_ISTER_DISK_DIRECTORIES_1_NAME: disk2
#      APP_ISTER_DISK_DIRECTORIES_1_PATH: /disk2
#      APP_ISTER_DISK_DIRECTORIES_1_LIBRARY: shows
      SPRING_RABBITMQ_HOST: rabbitMQ
      SPRING_RABBITMQ_USERNAME: user
      SPRING_RABBITMQ_PASSWORD: password
      OIDC_URL: https://localhost:8060/realms/Ister
      # Hardware acceleration — uncomment ONE block:
      # VAAPI (Intel/AMD):
#      HLS_HWACCEL: vaapi
#      HLS_HWACCEL_DEVICE: /dev/dri/renderD128
      # NVDEC (NVIDIA):
#      HLS_HWACCEL: nvdec
    ports:
      - "8080:8080"
    depends_on:
      migrations:
        condition: service_completed_successfully
      rabbitMQ:
        condition: service_healthy
    # VAAPI device access (uncomment for Intel/AMD hardware decoding):
#    devices:
#      - /dev/dri/renderD128:/dev/dri/renderD128
    # Required for AMD VAAPI — render group ID: getent group render | cut -d: -f3
#    group_add:
#      - "render"
    # NVIDIA GPU access (uncomment for NVIDIA hardware decoding).
    # Requires nvidia-container-toolkit on the host.
    # Option A: Compose v2:
#    deploy:
#      resources:
#        reservations:
#          devices:
#            - driver: nvidia
#              count: 1
#              capabilities: [gpu, video]
    # Option B: standalone Docker:
#    runtime: nvidia
