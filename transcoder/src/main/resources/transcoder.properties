# Hardware acceleration for video transcoding. Values: none, vaapi, nvdec
app.ister.transcoder.hls.hwaccel=${HLS_HWACCEL:none}
# Device path used by VAAPI (ignored for nvdec/none)
app.ister.transcoder.hls.hwaccel-device=${HLS_HWACCEL_DEVICE:/dev/dri/renderD128}
# Maximum number of media files that may be transcoded simultaneously
app.ister.transcoder.hls.max-concurrent-files=${HLS_MAX_CONCURRENT_FILES:2}
