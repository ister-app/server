name: Build
on:
  push:
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  # Conventional commits are what release.yml derives the version bump and the release-note
  # sections from, so a subject that does not follow them silently costs a release its notes.
  # Checked here rather than with an action: it is one grep, and it keeps the dependency list short.
  commit-lint:
    name: Commit messages
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Check the subjects against the convention
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          bad=$(git log --no-merges --pretty='%s' "${BASE}..${HEAD}" |
                grep -vP '^[a-z]+(\(.+\))?!?: .+' || true)
          if [ -n "$bad" ]; then
            echo "::error::These commit subjects are not conventional commits:"
            printf '  %s\n' "$bad"
            echo "Expected: <type>[(scope)][!]: <description>  — see CONTRIBUTING.md"
            exit 1
          fi
          echo "all commit subjects follow the convention"

  # Keeps doc/ shippable: EN/NL chapter parity, working relative links, balanced mermaid
  # fences. release.yml packages the same directory into the release zip, so a breakage
  # caught here is one that would otherwise surface during a release.
  docs:
    name: Docs validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Validate the documentation
        run: ci/build-docs.sh --check

  build:
    name: Build and analyze
    # The two commits release.yml pushes are version bookkeeping; they were already built green
    # as the commit they were cut from.
    if: ${{ github.event_name == 'pull_request' || !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up JDK 25
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 25
          distribution: 'zulu' # Alternative distribution options are available
      - name: Install ffmpeg on Ubuntu
        run: sudo apt-get update && sudo apt-get install -y ffmpeg && ffmpeg -version
      - name: Cache SonarCloud packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Gradle packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle
      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew build check jacocoTestReport sonar --info
