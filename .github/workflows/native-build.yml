# Validates the GraalVM native image on pull requests. The native build is the most
# fragile part of the toolchain (reflection/resource config), and docker-publish.yml
# only runs it after merge to main — this catches regressions before they land.
name: Native build

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  native-compile:
    name: GraalVM nativeCompile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle') }}
          restore-keys: ${{ runner.os }}-gradle

      - name: Native compile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew nativeCompile
