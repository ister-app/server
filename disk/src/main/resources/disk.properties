# The libraries (type: MOVIE, SHOW, MUSIC, BOOK or PODCAST)
# A PODCAST library needs no directory: feeds are added from the app and episodes are
# downloaded to this node's cache directory.
#app.ister.disk.libraries[0].name=shows
#app.ister.disk.libraries[0].type=SHOW
#app.ister.disk.libraries[1].name=books
#app.ister.disk.libraries[1].type=BOOK
#app.ister.disk.libraries[2].name=podcasts
#app.ister.disk.libraries[2].type=PODCAST

# The directories
#app.ister.disk.directories[0].name=disk1
#app.ister.disk.directories[0].path=/disk1
#app.ister.disk.directories[0].library=shows
#app.ister.disk.directories[1].name=disk2
#app.ister.disk.directories[1].path=/disk2
#app.ister.disk.directories[1].library=shows

# Images per message of a blur-hash sweep. Must stay small enough that one chunk finishes well
# within RabbitMQ's consumer_timeout (default 30 min), or the message is requeued and the sweep
# restarts forever without ever committing.
#app.ister.server.blur-hash.chunk-size=500

# Transcoder node: which disks should this node transcode for?
# If empty, falls back to app.ister.disk.directories (single-node / backward compatible).
#app.ister.transcoder.disks[0].name=disk1
